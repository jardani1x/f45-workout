<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F45 Workout</title>
  <meta name="description" content="Simple production-ready F45-style interval workout timer" />
  <style>
    :root {
      --bg: #0b0b0c;
      --panel: #17181b;
      --panel-2: #22242a;
      --text: #f5f7fb;
      --muted: #a2a8b3;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --green: #22c55e;
      --red: #ef4444;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #090909 0%, #121318 100%);
      color: var(--text);
      line-height: 1.45;
    }

    .app {
      max-width: 840px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: rgba(11, 11, 12, 0.88);
      border-bottom: 1px solid var(--border);
      margin: -20px -16px 18px;
      padding: 20px 16px 18px;
    }

    .hero-inner {
      max-width: 840px;
      margin: 0 auto;
      text-align: center;
    }

    .title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .phase {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .phase.work { color: var(--blue); }
    .phase.rest { color: var(--orange); }
    .phase.complete { color: var(--green); }

    .timer {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .status {
      color: var(--muted);
      margin-top: 10px;
      min-height: 24px;
      font-size: 0.98rem;
    }

    .progress-track {
      width: min(420px, 100%);
      margin: 16px auto 0;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--blue);
      transition: width 0.25s linear;
    }
    .progress-bar.rest { background: var(--orange); }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 22px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }
    button:hover { opacity: 0.95; }
    button:active { transform: scale(0.98); }

    .primary { background: var(--blue); color: white; }
    .secondary { background: var(--panel-2); color: var(--text); }
    .ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

    .card {
      background: rgba(23, 24, 27, 0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .next-up {
      padding: 16px;
      margin-bottom: 18px;
      display: none;
    }
    .next-up.show { display: block; }
    .next-up-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--orange);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .next-up-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
    .next-up-meta { color: var(--muted); font-size: 0.92rem; }

    .section {
      margin-top: 18px;
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .section-title { font-size: 1.15rem; font-weight: 700; }
    .section-badge {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(59,130,246,0.12);
      color: #8fc0ff;
      font-weight: 700;
    }

    .exercise-list {
      display: grid;
      gap: 10px;
    }

    .exercise {
      background: var(--panel-2);
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 14px;
    }
    .exercise.current {
      border-color: rgba(59,130,246,0.8);
      background: rgba(59,130,246,0.10);
    }
    .exercise.done {
      opacity: 0.45;
    }

    .exercise-top {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
    }
    .exercise-num {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .exercise.current .exercise-num {
      background: var(--blue);
      color: white;
    }
    .exercise-name { font-weight: 700; }
    .exercise-equip { color: #95bfff; font-size: 0.92rem; margin-left: 38px; }
    .exercise-cues { color: var(--muted); font-size: 0.92rem; margin-left: 38px; margin-top: 3px; }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      z-index: 50;
      padding: 20px;
    }
    .overlay.show { display: flex; }

    .complete-box {
      max-width: 420px;
      width: 100%;
      text-align: center;
      padding: 26px;
    }
    .complete-icon { font-size: 3rem; margin-bottom: 12px; }
    .complete-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    .complete-sub { color: var(--muted); margin-bottom: 18px; }

    .footer-note {
      text-align: center;
      color: var(--muted);
      margin-top: 18px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-inner">
        <div class="title">F45 Workout</div>
        <div id="phase" class="phase">Ready</div>
        <div id="timer" class="timer">00:40</div>
        <div id="status" class="status">Round 1/4 • Exercise 1/6</div>
        <div class="progress-track"><div id="progress" class="progress-bar"></div></div>
        <div class="controls">
          <button id="backBtn" class="secondary">Back</button>
          <button id="startBtn" class="primary">Start</button>
          <button id="nextBtn" class="secondary">Next</button>
          <button id="resetBtn" class="secondary">Reset</button>
          <button id="settingsBtn" class="ghost">Settings</button>
        </div>
      </div>
    </header>

    <section id="nextUpCard" class="card next-up">
      <div class="next-up-label">Coming Up Next</div>
      <div id="nextUpName" class="next-up-name"></div>
      <div id="nextUpMeta" class="next-up-meta"></div>
    </section>

    <main id="workoutRoot"></main>
    <div class="footer-note">Production build • static single-file app</div>
  </div>

  <div id="settingsOverlay" class="overlay">
    <div class="card complete-box" style="text-align:left; max-width:520px;">
      <div class="complete-title" style="font-size:1.2rem; margin-bottom:14px;">Workout Settings</div>
      <div style="display:grid; gap:12px;">
        <label>Work Seconds<br><input id="workInput" type="number" min="5" max="300" style="width:100%; margin-top:6px; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--panel-2); color:var(--text);"></label>
        <label>Rest Seconds<br><input id="restInput" type="number" min="5" max="300" style="width:100%; margin-top:6px; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--panel-2); color:var(--text);"></label>
        <label>Long Rest Seconds<br><input id="longRestInput" type="number" min="10" max="600" style="width:100%; margin-top:6px; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--panel-2); color:var(--text);"></label>
        <label><input id="soundToggle" type="checkbox"> Sound cues</label>
        <label><input id="vibrateToggle" type="checkbox"> Vibration cues</label>
      </div>
      <div class="controls" style="justify-content:flex-end; margin-top:18px;">
        <button id="closeSettingsBtn" class="secondary">Close</button>
        <button id="saveSettingsBtn" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div id="completeOverlay" class="overlay">
    <div class="card complete-box">
      <div class="complete-icon">🎉</div>
      <div class="complete-title">Workout Complete!</div>
      <div class="complete-sub">Great job finishing today’s session.</div>
      <button id="doneBtn" class="primary">Done</button>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      let WORK_TIME = 40;
      let REST_TIME = 20;
      let LONG_REST_TIME = 120;

      const EXERCISE_LIBRARY = {
        squat: [
          { name: 'DB Goblet Squat', equip: '1×10kg DB', cues: 'Elbows inside knees; full-foot pressure' },
          { name: 'DB Thruster', equip: '2×5kg DB', cues: 'Squat → drive overhead; steady breathing' },
          { name: 'Band Squat', equip: 'Band', cues: 'Knees out; constant tension; full depth' },
          { name: 'Tempo Air Squat', equip: 'Bodyweight', cues: '3s down; 1s pause; stand tall' }
        ],
        lunge: [
          { name: 'DB Reverse Lunge', equip: '2×5kg DB', cues: 'Step back softly; stay tall; alternate sides' },
          { name: 'DB Split Squat', equip: '2×5kg DB', cues: 'Control depth; front heel heavy; upright torso' },
          { name: 'Walking Lunge', equip: 'Bodyweight', cues: 'Long step; knee tracks toes; steady pace' },
          { name: 'Lateral Lunge', equip: 'Bodyweight', cues: 'Sit into hip; other leg long; chest up' }
        ],
        hinge: [
          { name: 'DB Romanian Deadlift', equip: '2×10kg DB', cues: 'Hips back; lats on; feel hamstrings' },
          { name: 'DB Single-Leg RDL', equip: '1×10kg DB', cues: 'Square hips; reach long; control' },
          { name: 'Band Good Morning', equip: 'Heavy band', cues: 'Band at hips; hinge; squeeze glutes' },
          { name: 'Glute Bridge', equip: 'Bodyweight', cues: 'Ribs down; full hip extension; pause' }
        ],
        push: [
          { name: 'DB Strict Press', equip: '2×10kg DB', cues: 'Ribs down; glutes tight; smooth press' },
          { name: 'DB Floor Press', equip: '2×10kg DB', cues: 'Elbows ~45°; pause on floor; press fast' },
          { name: 'Push-Ups', equip: 'Bodyweight', cues: 'Full-body tension; chest to floor; lock out' },
          { name: 'Band Triceps Pushdown', equip: 'Band', cues: 'Lock elbows; full extension; slow return' }
        ],
        pull: [
          { name: 'Pull-Ups / Chin-Ups', equip: 'Pull-up bar', cues: 'Full hang; ribs down; controlled reps' },
          { name: 'DB Bent-Over Row', equip: '2×10kg DB', cues: 'Flat back; pull to pockets; pause 1s' },
          { name: 'Single-Arm DB Row', equip: '1×10kg DB', cues: 'Brace hard; elbow to hip; slow return' },
          { name: 'Band Face Pull', equip: 'Light band', cues: 'Pull to eyebrows; elbows high; 1s squeeze' }
        ],
        carry: [
          { name: 'Farmer Carry March', equip: '2×10kg DB', cues: 'Tall posture; slow march; brace hard' },
          { name: 'Suitcase Carry March', equip: '1×10kg DB', cues: 'Stay square; avoid side bend; controlled steps' },
          { name: 'Front Rack Carry March', equip: '2×5kg DB', cues: 'Elbows up; ribs down; smooth steps' },
          { name: 'Overhead Carry March', equip: '2×5kg DB', cues: 'Lockout stable; slow feet; tight core' }
        ]
      };

      const CATEGORY_POOL = ['squat', 'lunge', 'hinge', 'push', 'pull', 'carry'];

      function seededRandom(seed) {

function seededRandom(seed) {
        const x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
      }

      function getTodaySeed() {
        return Number(new Date().toISOString().slice(0, 10).replaceAll('-', ''));
      }

      function pickExercises(category, count, offset) {
        const list = EXERCISE_LIBRARY[category];
        const used = new Set();
        const seed = getTodaySeed();
        const out = [];
        for (let i = 0; i < count; i++) {
          let idx = Math.floor(seededRandom(seed + offset + i) * list.length);
          while (used.has(idx) && used.size < list.length) idx = (idx + 1) % list.length;
          used.add(idx);
          out.push(list[idx]);
        }
        return out;
      }

      function shuffleWithSeed(items, seedBase) {
        const arr = [...items];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(seededRandom(seedBase + i) * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function pickOne(category, seedBase, usedByCategory) {
        const list = EXERCISE_LIBRARY[category];
        const used = usedByCategory[category] || new Set();
        let idx = Math.floor(seededRandom(seedBase) * list.length);
        let attempts = 0;
        while (used.has(idx) && attempts < list.length) {
          idx = (idx + 1) % list.length;
          attempts++;
        }
        used.add(idx);
        usedByCategory[category] = used;
        return { ...list[idx], category };
      }

      function buildSet(seedBase, usedByCategory) {
        const order = shuffleWithSeed(CATEGORY_POOL, seedBase);
        return order.map((category, i) => pickOne(category, seedBase + (i * 17), usedByCategory));
      }

      function buildWorkout() {
        const usedByCategory = {};
        const seed = getTodaySeed() + Math.floor(Math.random() * 100000);
        const set1 = buildSet(seed + 11, usedByCategory);
        const set2 = [...set1];
        const set3 = buildSet(seed + 97, usedByCategory);
        const set4 = [...set3];
        return {
          sets: [set1, set2, set3, set4],
          names: ['Set 1', 'Set 2', 'Set 3', 'Set 4'],
          longRestAfterSet: [false, true, false, false]
        };
      }

      const els = {
        phase: document.getElementById('phase'),
        timer: document.getElementById('timer'),
        status: document.getElementById('status'),
        progress: document.getElementById('progress'),
        startBtn: document.getElementById('startBtn'),
        resetBtn: document.getElementById('resetBtn'),
        doneBtn: document.getElementById('doneBtn'),
        backBtn: document.getElementById('backBtn'),
        nextBtn: document.getElementById('nextBtn'),
        settingsBtn: document.getElementById('settingsBtn'),
        settingsOverlay: document.getElementById('settingsOverlay'),
        closeSettingsBtn: document.getElementById('closeSettingsBtn'),
        saveSettingsBtn: document.getElementById('saveSettingsBtn'),
        workInput: document.getElementById('workInput'),
        restInput: document.getElementById('restInput'),
        longRestInput: document.getElementById('longRestInput'),
        soundToggle: document.getElementById('soundToggle'),
        vibrateToggle: document.getElementById('vibrateToggle'),
        nextUpCard: document.getElementById('nextUpCard'),
        nextUpName: document.getElementById('nextUpName'),
        nextUpMeta: document.getElementById('nextUpMeta'),
        workoutRoot: document.getElementById('workoutRoot'),
        completeOverlay: document.getElementById('completeOverlay')
      };


      const audioCtx = window.AudioContext ? new AudioContext() : null;
      const prefs = JSON.parse(localStorage.getItem('f45Prefs') || '{"sound":true,"vibrate":false,"work":40,"rest":20,"longRest":120}');
      let WORK_TIME = Number(prefs.work || 40);
      let REST_TIME = Number(prefs.rest || 20);
      let LONG_REST_TIME = Number(prefs.longRest || 120);

      function beep(freq = 880, duration = 120) {
        if (!prefs.sound || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.value = 0.03;
        osc.start();
        setTimeout(() => osc.stop(), duration);
      }

      function buzz(ms = 120) {
        if (prefs.vibrate && navigator.vibrate) navigator.vibrate(ms);
      }

      function openSettings() {
        els.workInput.value = WORK_TIME;
        els.restInput.value = REST_TIME;
        els.longRestInput.value = LONG_REST_TIME;
        els.soundToggle.checked = !!prefs.sound;
        els.vibrateToggle.checked = !!prefs.vibrate;
        els.settingsOverlay.classList.add('show');
      }

      function closeSettings() {
        els.settingsOverlay.classList.remove('show');
      }

      function saveSettings() {
        WORK_TIME = Math.max(5, Number(els.workInput.value || 40));
        REST_TIME = Math.max(5, Number(els.restInput.value || 20));
        LONG_REST_TIME = Math.max(10, Number(els.longRestInput.value || 120));
        prefs.work = WORK_TIME; prefs.rest = REST_TIME; prefs.longRest = LONG_REST_TIME;
        prefs.sound = !!els.soundToggle.checked;
        prefs.vibrate = !!els.vibrateToggle.checked;
        localStorage.setItem('f45Prefs', JSON.stringify(prefs));
        resetWorkout();
        closeSettings();
      }

      let workout = buildWorkout();
      const state = {
        running: false,
        timerId: null,
        currentSet: 0,
        currentExercise: 0,
        isWork: true,
        timeLeft: WORK_TIME
      };

      function renderWorkout() {
        els.workoutRoot.innerHTML = workout.sets.map((set, setIdx) => `
          <section class="card section" id="set-${setIdx}">
            <div class="section-head">
              <div class="section-title">${workout.names[setIdx]}</div>
              <div class="section-badge">${workout.longRestAfterSet[setIdx] ? 'Long rest after set' : '6 exercises'}</div>
            </div>
            <div class="exercise-list">
              ${set.map((ex, idx) => `
                <article class="exercise" data-set="${setIdx}" data-index="${idx}">
                  <div class="exercise-top">
                    <div class="exercise-num">${idx + 1}</div>
                    <div class="exercise-name">${ex.name}</div>
                  </div>
                  <div class="exercise-equip">${ex.equip}</div>
                  <div class="exercise-cues">${ex.cues}</div>
                </article>
              `).join('')}
            </div>
          </section>
        `).join('');
      }

      function getDisplayTarget() {
        if (state.isWork) return { set: state.currentSet, exercise: state.currentExercise };
        let nextSet = state.currentSet;
        let nextExercise = state.currentExercise + 1;
        if (nextExercise >= 6) {
          nextExercise = 0;
          nextSet += 1;
        }
        return { set: nextSet, exercise: nextExercise };
      }

      function updateExerciseStates() {
        document.querySelectorAll('.exercise').forEach((node) => {
          const setIdx = Number(node.dataset.set);
          const exIdx = Number(node.dataset.index);
          node.classList.remove('current', 'done');
          if (setIdx < state.currentSet || (setIdx === state.currentSet && exIdx < state.currentExercise)) {
            node.classList.add('done');
          }
        });
        const target = getDisplayTarget();
        const current = document.querySelector(`.exercise[data-set="${target.set}"][data-index="${target.exercise}"]`);
        if (current) current.classList.add('current');
      }

      function updateNextUp() {
        if (state.isWork) {
          els.nextUpCard.classList.remove('show');
          return;
        }
        const target = getDisplayTarget();
        const ex = workout.sets[target.set]?.[target.exercise];
        if (!ex) {
          els.nextUpCard.classList.remove('show');
          return;
        }
        els.nextUpName.textContent = ex.name;
        els.nextUpMeta.textContent = `${ex.equip} • ${ex.cues}`;
        els.nextUpCard.classList.add('show');
      }

      function updateStatus() {
        const target = getDisplayTarget();
        const ex = workout.sets[target.set]?.[target.exercise];
        const label = state.isWork ? 'WORK' : 'REST';
        els.phase.textContent = label;
        els.phase.className = `phase ${state.isWork ? 'work' : 'rest'}`;
        if (ex) {
          els.status.textContent = `Round ${target.set + 1}/4 • Exercise ${target.exercise + 1}/6 • ${ex.name}`;
        } else {
          els.status.textContent = 'Workout complete';
        }
      }

      function updateTimer() {
        const mins = String(Math.floor(state.timeLeft / 60)).padStart(2, '0');
        const secs = String(state.timeLeft % 60).padStart(2, '0');
        els.timer.textContent = `${mins}:${secs}`;
        const total = state.isWork ? WORK_TIME : (workout.longRestAfterSet[state.currentSet] && state.currentExercise === 5 ? LONG_REST_TIME : REST_TIME);
        const progress = ((total - state.timeLeft) / total) * 100;
        els.progress.style.width = `${Math.max(0, Math.min(100, progress))}%`;
        els.progress.className = `progress-bar${state.isWork ? '' : ' rest'}`;
      }

      function renderAll() {
        updateStatus();
        updateTimer();
        updateExerciseStates();
        updateNextUp();
      }

      function stopTimer() {
        state.running = false;
        if (state.timerId) clearInterval(state.timerId);
        state.timerId = null;
        els.startBtn.textContent = 'Start';
      }

      function completeWorkout() {
        stopTimer();
        els.phase.textContent = 'COMPLETE';
        els.phase.className = 'phase complete';
        els.completeOverlay.classList.add('show');
      }

      function advancePhase() {
        if (state.isWork) {
          const lastExercise = state.currentExercise === 5;
          const lastSet = state.currentSet === 3;
          if (lastExercise && lastSet) {
            completeWorkout();
            return;
          }
          state.isWork = false;
          state.timeLeft = lastExercise && workout.longRestAfterSet[state.currentSet] ? LONG_REST_TIME : REST_TIME;
        } else {
          state.isWork = true;
          if (state.currentExercise < 5) {
            state.currentExercise += 1;
          } else {
            state.currentExercise = 0;
            state.currentSet += 1;
          }
          state.timeLeft = WORK_TIME;
        }
        renderAll();
      }

      function tick() {
        if (state.timeLeft > 0) {
          if (state.timeLeft <= 3) {
            beep(700 + ((4 - state.timeLeft) * 120), 90);
            buzz(60);
          }
          state.timeLeft -= 1;
          updateTimer();
        } else {
          beep(state.isWork ? 620 : 920, 180); buzz(120); advancePhase();
        }
      }


      function goNext() {
        if (state.currentSet === 3 && state.currentExercise === 5 && state.isWork) {
          completeWorkout();
          return;
        }
        advancePhase();
      }

      function goBack() {
        if (!state.isWork) {
          state.isWork = true;
          state.timeLeft = WORK_TIME;
          renderAll();
          return;
        }
        if (state.currentExercise > 0) {
          state.currentExercise -= 1;
        } else if (state.currentSet > 0) {
          state.currentSet -= 1;
          state.currentExercise = 5;
        } else {
          state.timeLeft = WORK_TIME;
          renderAll();
          return;
        }
        state.isWork = true;
        state.timeLeft = WORK_TIME;
        renderAll();
      }

      function toggleStart() {
        if (state.running) {
          stopTimer();
          els.startBtn.textContent = 'Resume';
          return;
        }
        state.running = true;
        els.startBtn.textContent = 'Pause';
        state.timerId = setInterval(tick, 1000);
      }

      function resetWorkout() {
        stopTimer();
        workout = buildWorkout();
        renderWorkout();
        state.currentSet = 0;
        state.currentExercise = 0;
        state.isWork = true;
        state.timeLeft = WORK_TIME;
        els.completeOverlay.classList.remove('show');
        renderAll();
      }

      els.backBtn.addEventListener('click', goBack);
      els.startBtn.addEventListener('click', () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); toggleStart(); });
      els.nextBtn.addEventListener('click', goNext);
      els.resetBtn.addEventListener('click', resetWorkout);
      els.settingsBtn.addEventListener('click', openSettings);
      els.closeSettingsBtn.addEventListener('click', closeSettings);
      els.saveSettingsBtn.addEventListener('click', saveSettings);
      els.doneBtn.addEventListener('click', () => {
        els.completeOverlay.classList.remove('show');
        resetWorkout();
      });

      renderWorkout();
      renderAll();
    })();
  </script>
</body>
</html>
